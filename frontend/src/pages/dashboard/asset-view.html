<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="assets.viewPageTitle">Xem thông tin tài sản</title>
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />
  </head>
  <body data-required-roles="ADMIN,MANAGER,STAFF">
    <div class="app app--with-sidebar">
      <div id="appSidebar"></div>
      <main class="content">
        <header class="topbar">
          <div class="topbar-left">
            <strong id="topbarRoleText">Administrator</strong>
          </div>
          <div class="topbar-right"></div>
        </header>

        <section class="panel">
          <h1 class="page-title" data-i18n="assets.viewPageTitle">Xem thông tin tài sản</h1>
          <div class="asset-detail-section">
            <form id="assetViewForm" class="asset-detail-form" method="post" action="#">
              <h3 data-i18n="assets.sectionMainInfo">Thông tin chính</h3>
              <div class="form-grid">
                <input id="assetCardInput" name="cardNumber" type="hidden" />
                <div class="field"><label for="assetNameInput" data-i18n="assets.fieldName">Tên tài sản</label><input id="assetNameInput" name="assetName" type="text" /></div>
                <div class="field"><label for="assetCategoryInput" data-i18n="assets.fieldCategoryView">Danh mục tài sản</label><select id="assetCategoryInput" name="itemCategory"></select></div>
                <div class="field"><label for="assetRoomInput" data-i18n="assets.fieldRoomUsing">Phòng sử dụng</label><select id="assetRoomInput" name="roomId"></select></div>
                <div class="field"><label for="assetQuantityInput" data-i18n="assets.fieldQuantity">Số lượng</label><input id="assetQuantityInput" name="quantity" type="number" min="0" step="1" inputmode="numeric" /></div>
                <div class="field"><label for="assetStatusInput" data-i18n="assets.fieldStatus">Tình trạng</label><select id="assetStatusInput" name="status"><option value="IN_USE" data-i18n="assets.statusInUse">Đang sử dụng</option><option value="MAINTENANCE" data-i18n="assets.statusMaintenance">Bảo trì</option><option value="BROKEN" data-i18n="assets.statusBroken">Hư hỏng</option></select></div>
                <div class="field"><label for="assetPurchaseDateInput" data-i18n="assets.fieldPurchaseDate">Ngày mua</label><input id="assetPurchaseDateInput" name="purchaseDate" type="date" /></div>
                <div class="field"><label for="assetFundInput" data-i18n="assets.fieldFundSource">Nguồn kinh phí</label><select id="assetFundInput" name="fundSource"></select></div>
              </div>
              <div class="form-grid">
                <div class="field form-span-2"><label for="assetNoteInput" data-i18n="assets.fieldNote">Ghi chú</label><textarea id="assetNoteInput" name="note" class="asset-note-input" rows="4"></textarea></div>
              </div>
              <div class="form-span-2">
                <details>
                  <summary data-i18n="assets.sectionAdvanced">Thông tin nâng cao</summary>
                  <div class="form-grid" style="margin-top: 10px">
                    <div class="field"><label for="assetProviderInput" data-i18n="assets.fieldProvider">Nhà cung cấp</label><input id="assetProviderInput" name="provider" type="text" /></div>
                    <div class="field"><label for="assetCountryInput" data-i18n="assets.fieldCountry">Nước sản xuất</label><input id="assetCountryInput" name="country" type="text" /></div>
                    <div class="field"><label for="assetTypeInput" data-i18n="assets.fieldAssetType">Loại tài sản</label><input id="assetTypeInput" name="assetType" type="text" /></div>
                    <div class="field"><label for="assetManufactureYearInput" data-i18n="assets.fieldManufactureYear">Năm sản xuất</label><input id="assetManufactureYearInput" name="manufactureYear" type="number" min="1900" max="2100" step="1" /></div>
                    <div class="field"><label for="assetUnitPriceInput" data-i18n="assets.fieldUnitPrice">Đơn giá</label><input id="assetUnitPriceInput" name="unitPrice" type="number" min="0" step="1000" inputmode="numeric" /></div>
                    <div class="field"><label for="assetOriginalPriceInput" data-i18n="assets.fieldOriginalPrice">Nguyên giá</label><input id="assetOriginalPriceInput" name="originalPrice" type="number" min="0" step="1000" inputmode="numeric" /></div>
                    <div class="field"><label for="assetUsageTimeInput" data-i18n="assets.fieldUsageTime">Thời gian SD</label><input id="assetUsageTimeInput" name="usageTime" type="number" min="0" step="1" inputmode="numeric" /></div>
                    <div class="field"><label for="assetUsageYearInput" data-i18n="assets.fieldUsageYear">Năm sử dụng</label><input id="assetUsageYearInput" name="usageYear" type="number" min="1900" max="2100" step="1" /></div>
                  </div>
                </details>
              </div>
            </form>
            <div class="actions actions-centered asset-detail-actions">
              <button id="assetViewBackBtn" class="btn btn-success" type="button" data-i18n="assets.back">Quay lại</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/shared/menu-store.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/shared/sidebar.js"></script>
    <script src="../../assets/js/shared/i18n-manager.js"></script>
    <script src="../../assets/js/shared/lang-switcher.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/api/api-client.js"></script>
    <script src="../../assets/js/shared/asset-form-i18n.js"></script>
    <script src="../../assets/js/pages/asset-form-page.js"></script>
  </body>
</html>
