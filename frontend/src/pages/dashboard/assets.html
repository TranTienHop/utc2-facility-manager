<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý tài sản</title>
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />
  </head>
  <body data-required-roles="ADMIN,MANAGER,STAFF">
    <div class="app app--with-sidebar">
      <div id="appSidebar"></div>
      <main class="content">
        <header class="topbar">
          <div class="topbar-left">
            <strong id="topbarRoleText">Administrator</strong>
          </div>
          <div class="topbar-right"></div>
        </header>

        <section class="panel">
          <h1 id="assetPageTitle" class="page-title" data-i18n="assets.pageTitle">Quản lý tài sản</h1>
          <div id="assetTabs" class="tabs">
            <button id="assetTabList" class="tab tab-active" type="button" data-i18n="assets.tabList">Tất cả tài sản</button>
            <button id="assetTabDetail" class="tab" type="button" data-i18n="assets.tabDetail">Thêm tài sản</button>
            <button type="button" class="tab" id="assetsExportJsonBtn" data-i18n="toolbar.exportJson">Xuất JSON</button>
          </div>

          <div id="assetListSection">
            <div class="table-toolbar assets-list-toolbar">
              <div class="assets-list-toolbar__main statistics-filters">
                <label class="statistics-filter">
                  <span data-i18n="assets.filterBuilding">Lọc theo nhà</span>
                  <select id="assetFilterBuilding">
                    <option value="" data-i18n="statistics.filterAll">Tất cả</option>
                  </select>
                </label>
                <label class="statistics-filter">
                  <span data-i18n="assets.filterRoom">Lọc theo phòng</span>
                  <select id="assetFilterRoom">
                    <option value="" data-i18n="statistics.filterAll">Tất cả</option>
                  </select>
                </label>
                <label class="statistics-filter assets-page-size-filter">
                  <span data-i18n="toolbar.showRows">Hiển thị</span>
                  <select id="assetListPageSizeSelect">
                    <option>10</option>
                    <option>20</option>
                    <option>50</option>
                  </select>
                </label>
              </div>
              <div class="table-toolbar-right">
                <input id="assetListSearchInput" class="table-search-input" type="text" data-i18n-placeholder="buttons.search" placeholder="Tìm kiếm" />
              </div>
            </div>
            <div style="overflow-x: auto">
              <table>
                <thead>
                  <tr>
                    <th data-i18n="table.assets.category">Danh mục tài sản</th>
                    <th data-i18n="table.assets.name">Tên tài sản</th>
                    <th data-i18n="table.assets.quantity">Số lượng</th>
                    <th data-i18n="table.assets.unit">Phòng</th>
                    <th data-i18n="table.assets.status">Tình trạng</th>
                    <th data-i18n="table.assets.actions">Chức năng</th>
                  </tr>
                </thead>
                <tbody id="assetTableBody">
                  <tr><td colspan="6" style="text-align:center;padding:24px" data-i18n="assets.loading">Đang tải dữ liệu…</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div id="assetDetailSection" class="asset-detail-section" hidden>
            <div class="asset-detail-header">
              <h2 data-i18n="assets.detailHeading">Thêm tài sản</h2>
              <p data-i18n="assets.detailLead">Nhập thông tin tài sản mới vào hệ thống.</p>
            </div>
            <form id="assetDetailForm" class="form-grid asset-detail-form" method="post" action="#">
              <div class="field form-span-2">
                <label for="assetNameInput" data-i18n="assets.fieldName">Tên tài sản</label>
                <input id="assetNameInput" name="assetName" type="text" />
              </div>
              <input id="assetCardInput" name="cardNumber" type="hidden" />
              <div class="field">
                <label for="assetCategoryInput" data-i18n="assets.fieldCategory">Mục tài sản</label>
                <select id="assetCategoryInput" name="itemCategory"></select>
              </div>
              <div class="field">
                <label for="assetRoomInput" data-i18n="assets.fieldRoom">Phòng</label>
                <select id="assetRoomInput" name="roomId">
                  <option value="" data-i18n="assets.placeholderSelectRoom">-- Chọn phòng --</option>
                </select>
              </div>
              <div class="field">
                <label for="assetQuantityInput" data-i18n="assets.fieldQuantity">Số lượng</label>
                <input id="assetQuantityInput" name="quantity" type="number" min="0" step="1" inputmode="numeric" />
              </div>
              <div class="field">
                <label for="assetStatusInput" data-i18n="assets.fieldStatus">Tình trạng</label>
                <select id="assetStatusInput" name="status">
                  <option value="IN_USE" data-i18n="assets.statusInUse">Đang sử dụng</option>
                  <option value="MAINTENANCE" data-i18n="assets.statusMaintenance">Bảo trì</option>
                  <option value="BROKEN" data-i18n="assets.statusBroken">Hư hỏng</option>
                </select>
              </div>
              <div class="field">
                <label for="assetPurchaseDateInput" data-i18n="assets.fieldPurchaseDate">Ngày mua</label>
                <input id="assetPurchaseDateInput" name="purchaseDate" type="date" />
              </div>
              <div class="field">
                <label for="assetFundInput" data-i18n="assets.fieldFundSource">Nguồn kinh phí</label>
                <select id="assetFundInput" name="fundSource"></select>
              </div>
              <div class="field form-span-2">
                <label for="assetNoteInput" data-i18n="assets.fieldNote">Ghi chú</label>
                <textarea id="assetNoteInput" name="note" class="asset-note-input" rows="4" data-i18n-placeholder="assets.placeholderNoteDetail" placeholder="Nhập ghi chú chi tiết..."></textarea>
              </div>
              <div class="form-span-2">
                <details>
                  <summary data-i18n="assets.sectionAdvanced">Thông tin nâng cao</summary>
                  <div class="form-grid" style="margin-top: 10px">
                    <div class="field">
                      <label for="assetProviderInput" data-i18n="assets.fieldProvider">Nhà cung cấp</label>
                      <input id="assetProviderInput" name="provider" type="text" />
                    </div>
                    <div class="field">
                      <label for="assetCountryInput" data-i18n="assets.fieldCountry">Nước sản xuất</label>
                      <input id="assetCountryInput" name="country" type="text" />
                    </div>
                    <div class="field">
                      <label for="assetTypeInput" data-i18n="assets.fieldAssetType">Loại tài sản</label>
                      <input id="assetTypeInput" name="assetType" type="text" />
                    </div>
                    <div class="field">
                      <label for="assetManufactureYearInput" data-i18n="assets.fieldManufactureYear">Năm sản xuất</label>
                      <input id="assetManufactureYearInput" name="manufactureYear" type="number" min="1900" max="2100" step="1" />
                    </div>
                    <div class="field">
                      <label for="assetUnitPriceInput" data-i18n="assets.fieldUnitPrice">Đơn giá</label>
                      <input id="assetUnitPriceInput" name="unitPrice" type="number" min="0" step="1000" inputmode="numeric" />
                    </div>
                    <div class="field">
                      <label for="assetOriginalPriceInput" data-i18n="assets.fieldOriginalPrice">Nguyên giá</label>
                      <input id="assetOriginalPriceInput" name="originalPrice" type="number" min="0" step="1000" inputmode="numeric" />
                    </div>
                    <div class="field">
                      <label for="assetUsageTimeInput" data-i18n="assets.fieldUsageTime">Thời gian SD</label>
                      <input id="assetUsageTimeInput" name="usageTime" type="number" min="0" step="1" inputmode="numeric" />
                    </div>
                    <div class="field">
                      <label for="assetUsageYearInput" data-i18n="assets.fieldUsageYear">Năm sử dụng</label>
                      <input id="assetUsageYearInput" name="usageYear" type="number" min="1900" max="2100" step="1" />
                    </div>
                  </div>
                </details>
              </div>
            </form>
            <div class="actions actions-centered asset-detail-actions">
              <button id="assetDetailSubmitBtn" class="btn btn-primary" type="submit" form="assetDetailForm" data-i18n="assets.btnAdd">Thêm</button>
              <button id="assetDetailResetBtn" class="btn btn-success" type="reset" form="assetDetailForm" data-i18n="assets.btnReset">Nhập lại</button>
            </div>
          </div>

          <div id="assetTransferSection" hidden>
            <form id="assetTransferForm" class="form-grid" method="post" action="#">
              <input id="transferCardInput" name="cardNumber" type="hidden" />
              <div class="field">
                <label for="transferNameInput" data-i18n="assets.transferFieldName">Tên tài sản</label>
                <input id="transferNameInput" name="assetName" readonly />
              </div>
              <div class="field">
                <label for="transferCurrentRoomInput" data-i18n="assets.transferFieldCurrentRoom">Phòng hiện tại</label>
                <input id="transferCurrentRoomInput" name="sourceRoom" readonly />
              </div>
              <div class="field">
                <label for="transferTargetRoomInput" data-i18n="assets.transferFieldTargetRoom">Phòng đích</label>
                <input id="transferTargetRoomInput" name="targetRoom" data-i18n-placeholder="assets.placeholderTargetRoom" placeholder="Nhập phòng đích (ví dụ: P205E7)" />
              </div>
              <div class="field">
                <label for="transferQuantityInput" data-i18n="assets.transferFieldQuantity">Số lượng điều chuyển</label>
                <input id="transferQuantityInput" name="transferQuantity" type="number" min="1" step="1" />
              </div>
              <div class="field">
                <label for="transferDateInput" data-i18n="assets.transferFieldDate">Ngày điều chuyển</label>
                <input id="transferDateInput" name="receivedDate" type="date" />
              </div>
              <div class="field">
                <label for="transferGiverInput" data-i18n="assets.transferFieldGiver">Người bàn giao</label>
                <input id="transferGiverInput" name="giverName" value="" readonly />
              </div>
              <div class="field">
                <label for="transferReceiverInput" data-i18n="assets.transferFieldReceiver">Người nhận</label>
                <input id="transferReceiverInput" name="receiverName" data-i18n-placeholder="assets.placeholderReceiver" placeholder="Nhập người nhận" />
              </div>
              <div class="field form-span-2">
                <label for="transferNoteInput" data-i18n="assets.transferFieldNote">Ghi chú</label>
                <textarea id="transferNoteInput" name="note" rows="3" data-i18n-placeholder="assets.placeholderTransferNote" placeholder="Nhập ghi chú điều chuyển"></textarea>
              </div>
            </form>
            <div class="actions actions-centered">
              <button class="btn btn-success" type="submit" form="assetTransferForm" data-i18n="assets.btnTransfer">Điều chuyển</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/shared/menu-store.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/shared/sidebar.js"></script>
    <script src="../../assets/js/shared/i18n-manager.js"></script>
    <script src="../../assets/js/shared/lang-switcher.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/api/api-client.js"></script>
    <script src="../../assets/js/shared/export-json.js"></script>
    <script src="../../assets/js/shared/asset-form-i18n.js"></script>
    <script src="../../assets/js/shared/asset-i18n.js"></script>
    <script src="../../assets/js/pages/assets-page.js?v=20260604c"></script>
  </body>
</html>
