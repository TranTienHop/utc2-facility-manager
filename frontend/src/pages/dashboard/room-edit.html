<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cập nhật phòng</title>
    <link rel="stylesheet" href="../../assets/css/base.css" />
    <link rel="stylesheet" href="../../assets/css/layout.css" />
    <link rel="stylesheet" href="../../assets/css/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages.css" />
  </head>
  <body data-required-roles="ADMIN,MANAGER">
    <div class="app app--with-sidebar">
      <div id="appSidebar"></div>
      <main class="content">
        <header class="topbar">
          <div class="topbar-left">
            <strong id="topbarRoleText">Administrator</strong>
          </div>
          <div class="topbar-right"></div>
        </header>

        <section class="panel modern-panel">
          <h1 class="page-title">Cập nhật phòng - <span id="roomEditCodeLabel">NA-001</span></h1>
          <p class="form-building-hint" id="roomEditBuildingHint" hidden>Tòa: <strong id="roomEditBuildingLabel">—</strong></p>
          <form id="roomEditForm" class="modern-form user-form-layout" novalidate method="post" action="#">
            <div class="field">
              <label for="roomCodeReadonly">Mã phòng</label>
              <input type="text" id="roomCodeReadonly" name="roomCode" readonly autocomplete="off" />
            </div>

            <div class="field">
              <label for="roomFloorInput">Tầng</label>
              <input type="number" id="roomFloorInput" name="roomFloorInput" min="1" step="1" readonly />
            </div>

            <div class="field">
              <label for="roomEditDateInput" data-i18n="departments.selectDate">Ngày</label>
              <input type="date" id="roomEditDateInput" name="roomEditDate" readonly />
            </div>

            <div class="field">
              <label for="roomEditShiftSelect" data-i18n="departments.selectShift">Ca</label>
              <select id="roomEditShiftSelect" name="roomEditShift" disabled aria-readonly="true">
                <option value="" data-i18n="departments.shiftAll">—</option>
                <option value="MORNING" data-i18n="departments.shiftMorning">Sáng</option>
                <option value="AFTERNOON" data-i18n="departments.shiftAfternoon">Chiều</option>
                <option value="EVENING" data-i18n="departments.shiftEvening">Tối</option>
              </select>
            </div>

            <div class="field form-span-2">
              <label for="roomClassUsingInput">Lớp đang sử dụng</label>
              <select id="roomClassUsingInput" name="roomClassUsingInput" data-k65-class required>
                <option value="">Chọn lớp</option>
              </select>
            </div>

            <div class="field form-span-2">
              <label for="roomCapacityInput">Sức chứa</label>
              <input type="number" id="roomCapacityInput" name="roomCapacityInput" min="1" step="1" required />
            </div>

            <div class="field form-span-2">
              <label for="roomTeacherInput">Giảng viên dạy</label>
              <input type="text" id="roomTeacherInput" name="roomTeacherInput" required autocomplete="name" />
            </div>
          </form>
          <div class="actions actions-centered">
            <button id="roomUpdateSubmitBtn" class="btn btn-primary" type="submit" form="roomEditForm">Cập nhật</button>
            <button class="btn btn-success" type="button" onclick="history.back()">Hủy</button>
          </div>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/auth/auth.js"></script>
    <script src="../../assets/js/shared/menu-store.js"></script>
    <script src="../../assets/js/auth/guard.js"></script>
    <script src="../../assets/js/shared/sidebar.js"></script>
    <script src="../../assets/js/shared/i18n-manager.js"></script>
    <script src="../../assets/js/shared/lang-switcher.js"></script>
    <script src="../../assets/js/components/navigation.js"></script>
    <script src="../../assets/js/shared/menu-links.js"></script>
    <script src="../../assets/js/shared/table-controls.js"></script>
    <script src="../../assets/js/shared/room-helpers.js"></script>
    <script src="../../assets/js/api/api-client.js"></script>
    <script src="../../assets/js/shared/room-api.js?v=20260604u"></script>
    <script src="../../assets/js/pages/room-edit-page.js?v=20260604u"></script>
  </body>
</html>
